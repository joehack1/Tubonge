name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/android-apk.yml"
      - "mobile-apk/**"
      - "*.html"
      - "*.js"
      - "*.css"
      - "*.ico"
      - "*.png"
      - "*.jpg"
      - "*.gif"
      - "site.webmanifest"
  pull_request:
    paths:
      - ".github/workflows/android-apk.yml"
      - "mobile-apk/**"
      - "*.html"
      - "*.js"
      - "*.css"
      - "*.ico"
      - "*.png"
      - "*.jpg"
      - "*.gif"
      - "site.webmanifest"

permissions:
  contents: read

env:
  CORDOVA_TELEMETRY_OPTOUT: "1"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: mobile-apk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile-apk/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Node dependencies
        run: npm ci

      - name: Sync web assets into Cordova
        run: npm run sync:web

      - name: Write Firebase Android config
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "Missing ANDROID_GOOGLE_SERVICES_JSON secret." >&2
            exit 1
          fi
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > google-services.json

      - name: Read Cordova Android version
        id: cordova-android
        run: |
          VERSION=$(node -p "require('./package.json').devDependencies['cordova-android'].replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Add Android platform
        run: npx cordova@12 platform add android@${{ steps.cordova-android.outputs.version }}

      - name: Build debug APK
        run: npx cordova@12 build android --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tubonge-debug-apk
          path: mobile-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
